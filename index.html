<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北疆伊犁 · 旅行方案</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: #f5f2eb;
            color: #2c2416;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        h1 { font-size: 2rem; margin-bottom: 12px; color: #3a7b4b; }
        p { color: #6b5e4a; margin-bottom: 40px; }
        .cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 36px 40px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            text-decoration: none;
            color: #2c2416;
            transition: transform 0.2s, box-shadow 0.2s;
            min-width: 200px;
            text-align: center;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 14px 40px rgba(0,0,0,0.12); }
        .card h2 { font-size: 1.5rem; margin-bottom: 8px; color: #3a7b4b; }
        .card span { font-size: 0.9rem; color: #6b5e4a; }
    </style>
</head>
<body>
    <h1>北疆伊犁 · 旅行方案</h1>
    <p>选择查看不同版本的行程规划</p>
    <div class="cards">
        <a class="card" href="v1/">
            <h2>V1</h2>
            <span>9日慢享精华自驾之旅</span>
        </a>
        <a class="card" href="v2/">
            <h2>V2</h2>
            <span>9日北疆大环线深度自驾</span>
        </a>
    </div>
</body>
</html>
